kind = "web"
previewPath = "/"
title = "AI Sports Tracker"
version = "1.0.0"
id = "artifacts/sports-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18418

[services.development]
run = "pnpm --filter @workspace/sports-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sports-tracker", "run", "build" ]
publicDir = "artifacts/sports-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18418"
BASE_PATH = "/"
